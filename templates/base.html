<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>{% block title %}{% endblock %} | App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- (선택) Tailwind / CSS 로딩 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tmap SDK도 여기 head에 -->
    <!-- <script src="https://apis.openapi.sk.com/tmap/vectorjs?version=1&appKey=YOUR_WEB_KEY"></script> -->
</head>
<body class="bg-gray-100 text-gray-900">
    <header class="w-full bg-white border-b">
    <div class="w-full max-w-8xl mx-auto px-4 lg:px-60 py-3 flex items-center gap-4">
        {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}" class="font-semibold">Load Detector</a>
        <a href="{% url 'upload' %}" class="text-sm">업로드</a>
        <a href="{% url 'batch_list' %}" class="text-sm">목록</a>
        <span class="ml-auto text-sm text-gray-500">{{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}" class="inline">
            {% csrf_token %}
            <button class="text-sm">로그아웃</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}" class="ml-auto text-sm text-blue-700">로그인</a>
        {% endif %}
    </div>
    </header>



  <main class="w-full max-w-8xl mx-auto px-4 lg:px-60 py-6">
    {% if messages %}
      <div class="space-y-2 mb-4">
        {% for m in messages %}
          <div class="rounded px-3 py-2 text-sm
                      {% if m.tags == 'success' %} bg-green-100 text-green-800
                      {% elif m.tags == 'error' %} bg-red-100 text-red-800
                      {% else %} bg-gray-100 text-gray-800 {% endif %}">
            {{ m }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
