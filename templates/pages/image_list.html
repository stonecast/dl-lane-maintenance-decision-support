{% extends 'base.html' %}
{% block title %}이미지 목록{% endblock %}
{% block content %}
<h1 class="text-xl font-semibold mb-4">이미지 목록</h1>
<div class="grid md:grid-cols-4 gap-4">
    {% for it in items %}
        <div class="bg-white border rounded p-3">
            <div class="text-sm text-gray-500">#{{ it.id }}</div>
            <div class="font-medium break-all">{{ it.title|default:"(제목 없음)" }}</div>
            <div class="text-xs text-gray-500 break-all mt-1">{{ it.file.name }}</div>
            <div class="mt-2">
                <img src="{{ it.file.url }}" alt="img" class="w-full h-36 object-cover rounded" />
            </div>
            <div class="text-xs text-gray-500 mt-2">{{ it.uploaded_at }}</div>
        </div>
    {% empty %}
        <div class="text-gray-500">업로드된 이미지가 없습니다.</div>
    {% endfor %}
</div>
{% endblock %}
