{% extends 'base.html' %}
{% block title %}로그인{% endblock %}
{% block content %}
<h1 class="text-xl font-semibold mb-4">로그인</h1>
<form method="post" class="bg-white border rounded-xl p-4 space-y-4">
  {% csrf_token %}
  {% if form.errors %}
    <div class="text-sm text-red-600">아이디/비밀번호를 확인하세요.</div>
  {% endif %}

  <div class="mb-6 p-4 bg-gray-100 border rounded-xl">
  <h1 class="text-2xl font-bold">딥러닝 기반 도로노면 유지보수 자동화 모델 구축</h1>
  <p class="text-sm text-gray-700 mt-2">
    도로 이미지를 기반으로 차선 상태(정상/불량)를 자동 판별하고<br>
    교통 데이터를 활용해 보수 우선구간을 추천하는 시스템입니다.
    
  </p>

  <div class="mt-3 text-sm text-gray-800">
    <strong>참여자:</strong> 이원석, 하태용
  </div>
 </div>

  <div>
    <label class="block text-sm">아이디</label>
    <input type="text" name="username" required class="border rounded p-2 w-full">
  </div>
  <div>
    <label class="block text-sm">비밀번호</label>
    <input type="password" name="password" required class="border rounded p-2 w-full">
  </div>
  <button class="px-4 py-2 rounded bg-blue-600 text-white w-full">로그인</button>
</form>
{% endblock %}
